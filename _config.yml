locale: "en-US"
site_theme: "default"
title: "Yilin Li / Homepage"
title_separator: "-"
name: &name "Yilin Li"
description: &description "Personal homepage of Yilin Li"
url: https://mu-sec.github.io
baseurl: ""
repository: "mu-sec/mu-sec.github.io"

author:
  avatar: "headshot.png"
  name: "Yilin Li (李溢林)"
  bio: "Ph.D. Student @ Shandong University"
  location:
  employer:
  advisor:
  research:
  uri:
  email: "liyilin22@mail.sdu.edu.cn"
  academia:
  arxiv:
  googlescholar:
  inspire-hep:
  impactstory:
  orcid:
  semantic:
  ssrn:
  pubmed:
  researchgate:
  scopus:
  zotero:
  bitbucket:
  codepen:
  dribbble:
  github: "mu-sec"
  kaggle:
  stackoverflow:
  artstation:
  bluesky:
  facebook:
  flickr:
  foursquare:
  goodreads:
  google_plus:
  keybase:
  instagram:
  lastfm:
  linkedin:
  mastodon:
  medium:
  pinterest:
  soundcloud:
  steam:
  telegram:
  tumblr:
  twitter:
  vine:
  weibo:
  wikipedia:
  xing:
  youtube:
  zhihu:

breadcrumbs: false
words_per_minute: 160
future: true
read_more: "disabled"
talkmap_link: false

comments:
  provider:

atom_feed:
  hide: true
  path:

analytics:
  provider: "false"

include:
  - _pages
  - files

exclude:
  - .asset-cache
  - .bundle
  - .github
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/_main.js
  - assets/js/plugins
  - assets/js/vendor
  - CHANGELOG
  - Dockerfile
  - Gemfile.lock
  - LICENSE
  - node_modules
  - package.json*
  - README*
  - tmp
  - vendor

keep_files:
  - .git

encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

collections:
  publications:
    output: true
    permalink: /:collection/:path/

defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true
      share: false
      comments: false

sass:
  sass_dir: _sass
  style: compressed

permalink: /:categories/:title/
timezone: Asia/Shanghai

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

whitelist:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

compress_html:
  clippings: all
  ignore:
    envs: development
